name: Chatbot Quality

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  retrieval-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build retrieval index
        run: npm run chatbot:index
        env:
          WEBSITE_BASE_URL: ${{ secrets.CHATBOT_EVAL_BASE_URL }}

      - name: Run retrieval evaluation
        run: npm run chatbot:eval

  e2e-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run live chatbot e2e evaluation
        run: |
          if [ -z "$CHATBOT_EVAL_BASE_URL" ]; then
            echo "CHATBOT_EVAL_BASE_URL secret not set; skipping e2e eval."
            exit 0
          fi
          npm run chatbot:eval:e2e
        env:
          CHATBOT_EVAL_BASE_URL: ${{ secrets.CHATBOT_EVAL_BASE_URL }}
